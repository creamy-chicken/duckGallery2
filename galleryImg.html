<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Duck Gallery 2</title>
</head>
<body onload="addTabFocus()">
    <div class="gallery">
        <img src="duck12.jpg" alt="Duck racing across the water"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <img src="duck13.jpg" alt="Duck looking straight at the camera"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <img src="duck3.jpg" alt="Duck checking out the leaves by the pond"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <img src="duck4.jpg" alt="Duck standing in the grass"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <img src="duck5.jpg" alt="White duck gliding across the pond"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <img src="duck6.jpg" alt="Duck walking beside the water"
            onmouseover="showInfo(this)"
            onmouseleave="resetInfo()"
            onfocus="showInfo(this)"
            onblur="resetInfo()">

        <div class="info">
            <h3 id="image">Hover over an image below to display here.</h3>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
